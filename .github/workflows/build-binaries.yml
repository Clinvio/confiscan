name: Build Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: node18-macos-arm64
            artifact: confiscan-darwin-arm64
          - os: macos-latest
            target: node18-macos-x64
            artifact: confiscan-darwin-x64
          - os: ubuntu-latest
            target: node18-linux-x64
            artifact: confiscan-linux-x64
          - os: ubuntu-latest
            target: node18-linux-arm64
            artifact: confiscan-linux-arm64
          - os: windows-latest
            target: node18-win-x64
            artifact: confiscan-win-x64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build packages
        run: pnpm build
      
      - name: Install pkg
        run: npm install -g pkg
      
      - name: Build binary
        run: pkg packages/cli --target ${{ matrix.target }} --output binaries/confiscan
        env:
          PKG_CACHE_PATH: ~/.pkg-cache
      
      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd binaries
          tar -czf ${{ matrix.artifact }}.tar.gz confiscan
        working-directory: packages/cli
      
      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd binaries
          7z a ${{ matrix.artifact }}.zip confiscan.exe
        working-directory: packages/cli
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact }}
          path: packages/cli/binaries/${{ matrix.artifact }}.*
          if-no-files-found: error