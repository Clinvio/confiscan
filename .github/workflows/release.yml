name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Run tests
        run: pnpm test
      
      - name: Run linting
        run: pnpm lint
      
      - name: Run type checking
        run: pnpm typecheck

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build packages
        run: pnpm build
      
      - name: Publish to npm
        run: pnpm publish --filter @clinvio-hu/confiscan --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    needs: test
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: node18-macos-arm64
            artifact: confiscan-darwin-arm64
          - os: macos-latest
            target: node18-macos-x64
            artifact: confiscan-darwin-x64
          - os: ubuntu-latest
            target: node18-linux-x64
            artifact: confiscan-linux-x64
          - os: ubuntu-latest
            target: node18-linux-arm64
            artifact: confiscan-linux-arm64
          - os: windows-latest
            target: node18-win-x64
            artifact: confiscan-win-x64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build packages
        run: pnpm build
      
      - name: Install pkg
        run: npm install -g pkg
      
      - name: Build binary
        run: pkg packages/cli --target ${{ matrix.target }} --output binaries/confiscan
        env:
          PKG_CACHE_PATH: ~/.pkg-cache
      
      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd binaries
          tar -czf ${{ matrix.artifact }}.tar.gz confiscan
        working-directory: packages/cli
      
      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd binaries
          7z a ${{ matrix.artifact }}.zip confiscan.exe
        working-directory: packages/cli
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.artifact }}
          path: packages/cli/binaries/${{ matrix.artifact }}.*
          if-no-files-found: error

  create-release:
    needs: [publish-npm, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
      
      - name: Upload Release Assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/confiscan-darwin-arm64/confiscan-darwin-arm64.tar.gz
          asset_name: confiscan-darwin-arm64.tar.gz
          asset_content_type: application/gzip
      
      - name: Upload Release Assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/confiscan-darwin-x64/confiscan-darwin-x64.tar.gz
          asset_name: confiscan-darwin-x64.tar.gz
          asset_content_type: application/gzip
      
      - name: Upload Release Assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/confiscan-linux-x64/confiscan-linux-x64.tar.gz
          asset_name: confiscan-linux-x64.tar.gz
          asset_content_type: application/gzip
      
      - name: Upload Release Assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/confiscan-linux-arm64/confiscan-linux-arm64.tar.gz
          asset_name: confiscan-linux-arm64.tar.gz
          asset_content_type: application/gzip
      
      - name: Upload Release Assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/confiscan-win-x64/confiscan-win-x64.zip
          asset_name: confiscan-win-x64.zip
          asset_content_type: application/zip