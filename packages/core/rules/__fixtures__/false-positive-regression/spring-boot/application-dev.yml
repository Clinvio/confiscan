# Spring Boot Development Profile Configuration
# This file should produce ZERO findings
# All sensitive values use environment variable references

spring:
  # Development Database (H2 in-memory)
  datasource:
    url: jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  # H2 Console (development only)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false
  
  # JPA Configuration for Development
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    database-platform: org.hibernate.dialect.H2Dialect
  
  # Development Security (less restrictive)
  security:
    user:
      name: admin
      password: admin
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-client-secret}
  
  # Development Mail (using MailHog or similar)
  mail:
    host: ${DEV_MAIL_HOST:localhost}
    port: ${DEV_MAIL_PORT:1025}
    username: 
    password: 
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  
  # Development Redis
  data:
    redis:
      host: ${DEV_REDIS_HOST:localhost}
      port: ${DEV_REDIS_PORT:6379}
      password: 

# Development Server Configuration
server:
  port: ${DEV_SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-stacktrace: always
    include-message: always

# Development Logging (more verbose)
logging:
  level:
    root: DEBUG
    com.example: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Development Actuator (all endpoints exposed)
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    info:
      enabled: true

# Development JWT Configuration
jwt:
  secret: ${JWT_SECRET:dev-jwt-secret-key-for-development-only}
  expiration: ${JWT_EXPIRATION:86400}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}
  issuer: ${JWT_ISSUER:confiscan-dev}

# Development Email Configuration
email:
  from: ${EMAIL_FROM:dev@example.com}
  smtp:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: 
    password: 

# Development Feature Flags
app:
  features:
    cache-enabled: false
    notifications-enabled: false
    audit-enabled: false
    rate-limiting-enabled: false
  
  # Development Services (using mocks)
  services:
    payment:
      url: ${PAYMENT_SERVICE_URL:http://localhost:8081}
      api-key: ${PAYMENT_SERVICE_API_KEY:dev-api-key}
      timeout: 10000
    notification:
      url: ${NOTIFICATION_SERVICE_URL:http://localhost:8082}
      api-key: ${NOTIFICATION_SERVICE_API_KEY:dev-api-key}
      timeout: 5000
    storage:
      provider: local
      bucket: dev-bucket
      region: us-east-1
      access-key: ${STORAGE_ACCESS_KEY:dev-access-key}
      secret-key: ${STORAGE_SECRET_KEY:dev-secret-key}

# Development CORS (allow all origins)
app:
  security:
    cors:
      allowed-origins: "*"
      allowed-methods: "*"
      allowed-headers: "*"
      allow-credentials: true

# Development Monitoring
app:
  monitoring:
    enabled: false
    sample-rate: 1.0
    export-interval: 30

# Development Swagger (enabled)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Development Task Scheduling
spring:
  task:
    scheduling:
      pool:
        size: 2
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 50

# Development WebSocket
spring:
  websocket:
    max-text-message-size: 65536
    max-binary-message-size: 65536

# Development File Upload
spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

# Development Session
spring:
  session:
    store-type: none
    timeout: 3600

# Development Cache (simple in-memory)
spring:
  cache:
    type: simple

# Development Flyway
spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

# Development Liquibase
spring:
  liquibase:
    enabled: false