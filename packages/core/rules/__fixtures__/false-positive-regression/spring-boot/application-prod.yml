# Spring Boot Production Profile Configuration
# This file should produce ZERO findings
# All sensitive values use environment variable references

spring:
  # Production Database
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      connection-timeout: ${DB_POOL_TIMEOUT:30000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:600000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1800000}
      leak-detection-threshold: ${DB_LEAK_DETECTION_THRESHOLD:60000}
  
  # Production JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
        generate_statistics: false
    open-in-view: false
  
  # Production Security (strict)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email
              - read:user
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI}
  
  # Production Redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: ${REDIS_TIMEOUT:2000}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:8}
          max-idle: ${REDIS_POOL_MAX_IDLE:8}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}
          time-between-eviction-runs: ${REDIS_POOL_EVICTION_RUNS:300000}
  
  # Production Mail
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT:5000}
          timeout: ${MAIL_TIMEOUT:5000}
  
  # Production Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    serialization-inclusion: non_null

# Production Server Configuration
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${CONTEXT_PATH:/api}
  ssl:
    enabled: true
    key-store: ${SSL_KEY_STORE}
    key-store-password: ${SSL_KEY_STORE_PASSWORD}
    key-store-type: ${SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SSL_KEY_ALIAS}
    protocol: TLS
    enabled-protocols: TLSv1.2,TLSv1.3
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  http2:
    enabled: true
  tomcat:
    max-threads: ${TOMCAT_MAX_THREADS:200}
    min-spare-threads: ${TOMCAT_MIN_SPARE_THREADS:10}
    accept-count: ${TOMCAT_ACCEPT_COUNT:100}
    max-connections: ${TOMCAT_MAX_CONNECTIONS:10000}
    connection-timeout: ${TOMCAT_CONNECTION_TIMEOUT:20000}
    max-http-form-post-size: ${TOMCAT_MAX_HTTP_FORM_POST_SIZE:2MB}
    accesslog:
      enabled: true
      directory: logs
      prefix: access_log
      suffix: .log
      pattern: "%h %l %u %t \"%r\" %s %b \"%{Referer}i\" \"%{User-Agent}i\""
      buffered: true

# Production JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}
  issuer: ${JWT_ISSUER:confiscan}

# Production Email Configuration
email:
  from: ${EMAIL_FROM:noreply@example.com}
  smtp:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    auth: true
    starttls: true

# Production Logging (minimal)
logging:
  level:
    root: ${LOG_LEVEL:WARN}
    com.example: ${APP_LOG_LEVEL:INFO}
    org.springframework.security: ${SECURITY_LOG_LEVEL:WARN}
    org.hibernate: ${HIBERNATE_LOG_LEVEL:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:/var/log/application/application.log}
    max-size: ${LOG_MAX_SIZE:100MB}
    max-history: ${LOG_MAX_HISTORY:30}
    total-size-cap: ${LOG_TOTAL_SIZE_CAP:5GB}
  logback:
    rollingpolicy:
      max-file-size: ${LOG_MAX_FILE_SIZE:100MB}
      max-history: ${LOG_MAX_HISTORY:30}
      total-size-cap: ${LOG_TOTAL_SIZE_CAP:5GB}
      clean-history-on-start: ${LOG_CLEAN_HISTORY_ON_START:false}

# Production Actuator (minimal exposure)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: ${ACTUATOR_BASE_PATH:/actuator}
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    info:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: ${PROMETHEUS_ENABLED:true}
        step: ${PROMETHEUS_STEP:60}
        descriptions: true
  health:
    redis:
      enabled: true
    db:
      enabled: true
    diskspace:
      enabled: true
      threshold: ${DISKSPACE_THRESHOLD:10GB}
  server:
    port: ${MANAGEMENT_PORT:8081}
    address: ${MANAGEMENT_ADDRESS:127.0.0.1}

# Production Custom Application Properties
app:
  name: ${APP_NAME:My Application}
  version: ${APP_VERSION:1.0.0}
  description: ${APP_DESCRIPTION:A Spring Boot application}
  
  # Production Feature Flags
  features:
    cache-enabled: ${CACHE_ENABLED:true}
    notifications-enabled: ${NOTIFICATIONS_ENABLED:true}
    audit-enabled: ${AUDIT_ENABLED:true}
    rate-limiting-enabled: ${RATE_LIMITING_ENABLED:true}
  
  # Production External Services
  services:
    payment:
      url: ${PAYMENT_SERVICE_URL}
      api-key: ${PAYMENT_SERVICE_API_KEY}
      timeout: ${PAYMENT_SERVICE_TIMEOUT:5000}
      retry:
        max-attempts: ${PAYMENT_SERVICE_RETRY_MAX_ATTEMPTS:3}
        backoff-delay: ${PAYMENT_SERVICE_RETRY_BACKOFF_DELAY:1000}
    notification:
      url: ${NOTIFICATION_SERVICE_URL}
      api-key: ${NOTIFICATION_SERVICE_API_KEY}
      timeout: ${NOTIFICATION_SERVICE_TIMEOUT:3000}
      retry:
        max-attempts: ${NOTIFICATION_SERVICE_RETRY_MAX_ATTEMPTS:3}
        backoff-delay: ${NOTIFICATION_SERVICE_RETRY_BACKOFF_DELAY:1000}
    storage:
      provider: ${STORAGE_PROVIDER:s3}
      bucket: ${STORAGE_BUCKET}
      region: ${STORAGE_REGION:us-east-1}
      access-key: ${STORAGE_ACCESS_KEY}
      secret-key: ${STORAGE_SECRET_KEY}
      endpoint: ${STORAGE_ENDPOINT}
      path-style-access: ${STORAGE_PATH_STYLE_ACCESS:false}
  
  # Production Security
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS}
      allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
      allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type}
      allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
      max-age: ${CORS_MAX_AGE:3600}
    rate-limiting:
      requests-per-minute: ${RATE_LIMIT_REQUESTS:60}
      burst-capacity: ${RATE_LIMIT_BURST:100}
      key-resolver: ${RATE_LIMIT_KEY_RESOLVER:ip}
  
  # Production Monitoring
  monitoring:
    enabled: ${MONITORING_ENABLED:true}
    sample-rate: ${MONITORING_SAMPLE_RATE:0.1}
    export-interval: ${MONITORING_EXPORT_INTERVAL:60}
    tags:
      environment: ${ENVIRONMENT:production}
      application: ${APP_NAME:my-application}
      region: ${REGION:us-east-1}

# Production Spring Cloud Configuration
spring:
  cloud:
    config:
      uri: ${CONFIG_SERVER_URI}
      fail-fast: true
      retry:
        max-attempts: ${CONFIG_RETRY_MAX_ATTEMPTS:6}
        initial-interval: ${CONFIG_RETRY_INITIAL_INTERVAL:1000}
        max-interval: ${CONFIG_RETRY_MAX_INTERVAL:2000}
        multiplier: ${CONFIG_RETRY_MULTIPLIER:1.1}
      username: ${CONFIG_SERVER_USERNAME}
      password: ${CONFIG_SERVER_PASSWORD}
      label: ${CONFIG_LABEL:master}

# Production Ribbon Configuration
ribbon:
  eureka:
    enabled: ${RIBBON_EUREKA_ENABLED:false}
  MaxAutoRetries: ${RIBBON_MAX_AUTO_RETRIES:0}
  MaxAutoRetriesNextServer: ${RIBBON_MAX_AUTO_RETRIES_NEXT_SERVER:1}
  OkToRetryOnAllOperations: ${RIBBON_OK_TO_RETRY_ON_ALL_OPERATIONS:true}
  ServerListRefreshInterval: ${RIBBON_SERVER_LIST_REFRESH_INTERVAL:30000}
  ConnectTimeout: ${RIBBON_CONNECT_TIMEOUT:3000}
  ReadTimeout: ${RIBBON_READ_TIMEOUT:5000}

# Production Hystrix Configuration
hystrix:
  command:
    default:
      execution:
        isolation:
          thread:
            timeoutInMilliseconds: ${HYSTRIX_TIMEOUT:10000}
      circuitBreaker:
        requestVolumeThreshold: ${HYSTRIX_REQUEST_VOLUME_THRESHOLD:20}
        errorThresholdPercentage: ${HYSTRIX_ERROR_THRESHOLD_PERCENTAGE:50}
        sleepWindowInMilliseconds: ${HYSTRIX_SLEEP_WINDOW:5000}
      metrics:
        rollingStats:
          timeInMilliseconds: ${HYSTRICS_METRICS_ROLLING_STATS_TIME:10000}
          numBuckets: ${HYSTRICS_METRICS_ROLLING_STATS_BUCKETS:10}

# Production Swagger/OpenAPI (disabled)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Production Task Scheduling
spring:
  task:
    scheduling:
      pool:
        size: ${TASK_SCHEDULING_POOL_SIZE:10}
    execution:
      pool:
        core-size: ${TASK_EXECUTION_POOL_CORE_SIZE:16}
        max-size: ${TASK_EXECUTION_POOL_MAX_SIZE:32}
        queue-capacity: ${TASK_EXECUTION_QUEUE_CAPACITY:200}
        keep-alive: ${TASK_EXECUTION_KEEP_ALIVE:60}
      rejection-policy: ${TASK_EXECUTION_REJECTION_POLICY:CALLER_RUNS}

# Production WebSocket
spring:
  websocket:
    max-text-message-size: ${WEBSOCKET_MAX_TEXT_MESSAGE_SIZE:65536}
    max-binary-message-size: ${WEBSOCKET_MAX_BINARY_MESSAGE_SIZE:65536}

# Production File Upload
spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:10MB}
      file-size-threshold: ${FILE_SIZE_THRESHOLD:2KB}
      resolve-lazily: ${RESOLVE_LAZILY:false}

# Production Session
spring:
  session:
    store-type: ${SESSION_STORE_TYPE:redis}
    timeout: ${SESSION_TIMEOUT:1800}
    redis:
      namespace: ${SESSION_REDIS_NAMESPACE:confiscan:session}
      flush-mode: ${SESSION_REDIS_FLUSH_MODE:on_save}
      save-mode: ${SESSION_REDIS_SAVE_MODE:set}

# Production Cache
spring:
  cache:
    type: ${CACHE_TYPE:redis}
    redis:
      time-to-live: ${CACHE_TTL:3600000}
      cache-null-values: ${CACHE_NULL_VALUES:true}
      key-prefix: ${CACHE_KEY_PREFIX:confiscan:cache:}
      use-key-prefix: ${CACHE_USE_KEY_PREFIX:true}

# Production Flyway
spring:
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    validate-on-migrate: ${FLYWAY_VALIDATE_ON_MIGRATE:true}
    out-of-order: ${FLYWAY_OUT_OF_ORDER:false}
    clean-disabled: ${FLYWAY_CLEAN_DISABLED:true}
    table: ${FLYWAY_TABLE:schema_version}

# Production Liquibase
spring:
  liquibase:
    enabled: ${LIQUIBASE_ENABLED:false}
    change-log: ${LIQUIBASE_CHANGE_LOG:classpath:db/changelog/db.changelog-master.xml}
    contexts: ${LIQUIBASE_CONTEXTS:production}

# Production Database Migration Safety
spring:
  datasource:
    hikari:
      connection-test-query: ${DB_CONNECTION_TEST_QUERY:SELECT 1}
      validation-timeout: ${DB_VALIDATION_TIMEOUT:5000}
      initialization-fail-timeout: ${DB_INITIALIZATION_FAIL_TIMEOUT:1}

# Production Graceful Shutdown
server:
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:30s}

# Production Error Handling
server:
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false
    whitelabel:
      enabled: false