# Java Application Properties
# This file should produce ZERO findings
# All sensitive values use environment variable references or placeholder values

# Application
spring.application.name=${APP_NAME:my-application}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${CONTEXT_PATH:/api}
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/myapp}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_POOL_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1800000}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000}

# Security Configuration
spring.security.user.name=${SECURITY_USERNAME:user}
spring.security.user.password=${SECURITY_PASSWORD:changeme}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800}
jwt.issuer=${JWT_ISSUER:my-application}

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging Configuration
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.example=${APP_LOG_LEVEL:DEBUG}
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=${LOG_FILE:logs/application.log}
logging.logback.rollingpolicy.max-file-size=${LOG_MAX_SIZE:10MB}
logging.logback.rollingpolicy.max-history=${LOG_MAX_HISTORY:30}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=${HEALTH_DETAILS:when_authorized}
management.endpoint.health.probes.enabled=true
management.metrics.export.prometheus.enabled=${PROMETHEUS_ENABLED:true}

# Custom Application Properties
app.name=${APP_NAME:My Application}
app.version=${APP_VERSION:1.0.0}
app.description=${APP_DESCRIPTION:A Spring Boot application}

# Feature Flags
app.features.cache-enabled=${CACHE_ENABLED:true}
app.features.notifications-enabled=${NOTIFICATIONS_ENABLED:true}
app.features.audit-enabled=${AUDIT_ENABLED:true}
app.features.rate-limiting-enabled=${RATE_LIMITING_ENABLED:true}

# External Services
app.services.payment.url=${PAYMENT_SERVICE_URL}
app.services.payment.api-key=${PAYMENT_SERVICE_API_KEY}
app.services.payment.timeout=${PAYMENT_SERVICE_TIMEOUT:5000}

app.services.notification.url=${NOTIFICATION_SERVICE_URL}
app.services.notification.api-key=${NOTIFICATION_SERVICE_API_KEY}
app.services.notification.timeout=${NOTIFICATION_SERVICE_TIMEOUT:3000}

app.services.storage.provider=${STORAGE_PROVIDER:s3}
app.services.storage.bucket=${STORAGE_BUCKET}
app.services.storage.region=${STORAGE_REGION:us-east-1}
app.services.storage.access-key=${STORAGE_ACCESS_KEY}
app.services.storage.secret-key=${STORAGE_SECRET_KEY}

# Security Configuration
app.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.security.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
app.security.cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
app.security.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:true}

app.security.rate-limiting.requests-per-minute=${RATE_LIMIT_REQUESTS:60}
app.security.rate-limiting.burst-capacity=${RATE_LIMIT_BURST:100}

# Monitoring Configuration
app.monitoring.enabled=${MONITORING_ENABLED:true}
app.monitoring.sample-rate=${MONITORING_SAMPLE_RATE:0.1}
app.monitoring.export-interval=${MONITORING_EXPORT_INTERVAL:60}

# Spring Cloud Configuration
spring.cloud.config.uri=${CONFIG_SERVER_URI:http://localhost:8888}
spring.cloud.config.fail-fast=${CONFIG_FAIL_FAST:false}
spring.cloud.config.retry.max-attempts=${CONFIG_RETRY_MAX_ATTEMPTS:6}
spring.cloud.config.retry.initial-interval=${CONFIG_RETRY_INITIAL_INTERVAL:1000}
spring.cloud.config.retry.max-interval=${CONFIG_RETRY_MAX_INTERVAL:2000}
spring.cloud.config.retry.multiplier=${CONFIG_RETRY_MULTIPLIER:1.1}

# Ribbon Configuration
ribbon.eureka.enabled=${RIBBON_EUREKA_ENABLED:false}
ribbon.MaxAutoRetries=${RIBBON_MAX_AUTO_RETRIES:0}
ribbon.MaxAutoRetriesNextServer=${RIBBON_MAX_AUTO_RETRIES_NEXT_SERVER:1}
ribbon.OkToRetryOnAllOperations=${RIBBON_OK_TO_RETRY_ON_ALL_OPERATIONS:true}
ribbon.ServerListRefreshInterval=${RIBBON_SERVER_LIST_REFRESH_INTERVAL:30000}

# Hystrix Configuration
hystrix.command.default.execution.isolation.thread.timeoutInMilliseconds=${HYSTRIX_TIMEOUT:10000}
hystrix.command.default.circuitBreaker.requestVolumeThreshold=${HYSTRIX_REQUEST_VOLUME_THRESHOLD:20}
hystrix.command.default.circuitBreaker.errorThresholdPercentage=${HYSTRIX_ERROR_THRESHOLD_PERCENTAGE:50}
hystrix.command.default.circuitBreaker.sleepWindowInMilliseconds=${HYSTRIX_SLEEP_WINDOW:5000}

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=${SWAGGER_API_DOCS_PATH:/v3/api-docs}
springdoc.swagger-ui.path=${SWAGGER_UI_PATH:/swagger-ui.html}
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Task Scheduling
spring.task.scheduling.pool.size=${TASK_SCHEDULING_POOL_SIZE:5}
spring.task.execution.pool.core-size=${TASK_EXECUTION_POOL_CORE_SIZE:8}
spring.task.execution.pool.max-size=${TASK_EXECUTION_POOL_MAX_SIZE:16}
spring.task.execution.pool.queue-capacity=${TASK_EXECUTION_QUEUE_CAPACITY:100}

# WebSocket Configuration
spring.websocket.max-text-message-size=${WEBSOCKET_MAX_TEXT_MESSAGE_SIZE:65536}
spring.websocket.max-binary-message-size=${WEBSOCKET_MAX_BINARY_MESSAGE_SIZE:65536}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:10MB}

# Session Configuration
spring.session.store-type=${SESSION_STORE_TYPE:redis}
spring.session.timeout=${SESSION_TIMEOUT:1800}
spring.session.redis.namespace=${SESSION_REDIS_NAMESPACE:my-application:session}

# Cache Configuration
spring.cache.type=${CACHE_TYPE:redis}
spring.cache.redis.time-to-live=${CACHE_TTL:3600000}
spring.cache.redis.cache-null-values=${CACHE_NULL_VALUES:true}

# Flyway Database Migration
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=${FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:true}
spring.flyway.validate-on-migrate=${FLYWAY_VALIDATE_ON_MIGRATE:true}

# Liquibase Database Migration
spring.liquibase.enabled=${LIQUIBASE_ENABLED:false}
spring.liquibase.change-log=${LIQUIBASE_CHANGE_LOG:classpath:db/changelog/db.changelog-master.xml}

# Graceful Shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=${SHUTDOWN_TIMEOUT:30s}

# Error Handling
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# Tomcat Configuration
server.tomcat.max-threads=${TOMCAT_MAX_THREADS:200}
server.tomcat.min-spare-threads=${TOMCAT_MIN_SPARE_THREADS:10}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:100}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:10000}
server.tomcat.connection-timeout=${TOMCAT_CONNECTION_TIMEOUT:20000}

# SSL Configuration
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store=${SSL_KEY_STORE}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD}
server.ssl.key-store-type=${SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${SSL_KEY_ALIAS}

# HTTP/2 Configuration
server.http2.enabled=${HTTP2_ENABLED:true}

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null